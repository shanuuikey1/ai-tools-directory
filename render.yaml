# Render Blueprint — provisions the backend API + a free PostgreSQL
# database in one step. On render.com: New → Blueprint → pick this repo.
# After it deploys, set the two Razorpay secrets in the dashboard.
services:
  - type: web
    name: urban-services-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/app.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: urban-services-db
          property: connectionString
      # Set these in the Render dashboard (Environment) after first deploy.
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

databases:
  - name: urban-services-db
    plan: free
