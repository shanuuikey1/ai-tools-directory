# Render Blueprint — provisions the backend API + a free PostgreSQL
# database in one step. On render.com: New → Blueprint → pick this repo.
# After it deploys, set the two Razorpay secrets in the dashboard.
services:
  - type: web
    name: ghar-pahuch-seva-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/app.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      # Admin key for protected routes (e.g. creating services).
      # Render generates a random value; copy it from the dashboard.
      - key: ADMIN_API_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ghar-pahuch-seva-db
          property: connectionString
      # Set these in the Render dashboard (Environment) after first deploy.
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      # WhatsApp Notifications (Optional)
      - key: WHATSAPP_NOTIFICATION_MODE
        value: console
      - key: WHATSAPP_API_URL
        value: https://api.green-api.com
      - key: WHATSAPP_INSTANCE_ID
        sync: false
      - key: WHATSAPP_API_TOKEN
        sync: false
      - key: WHATSAPP_GROUP_ID
        sync: false


databases:
  - name: ghar-pahuch-seva-db
    plan: free
