# Root Netlify config — the web app lives in the web/ subfolder.
# With `base = "web"`, Netlify auto-detects everything when you connect
# the GitHub repo, so no manual build settings are needed in the UI.

[build]
  base = "web"
  command = "npm run build"
  publish = "dist"

# SPA fallback so React Router deep links work on refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers applied to every response served by Netlify.
# The CSP allow-lists the third parties this app actually uses:
#   - Razorpay checkout (script/frame/connect)
#   - Google Fonts + Fontshare (style/font)
#   - the deployed backend API (connect)
# If you add a new third-party origin, extend the matching directive.
# NOTE: verify payments + font loading after the first deploy; tighten
# 'unsafe-inline' on style-src later via hashed styles if desired.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://checkout.razorpay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.fontshare.com; font-src 'self' data: https://fonts.gstatic.com https://api.fontshare.com; img-src 'self' data: https:; connect-src 'self' https://urban-services-backend-1khb.onrender.com https://*.razorpay.com https://fonts.googleapis.com https://api.fontshare.com; frame-src https://*.razorpay.com https://checkout.razorpay.com; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(self \"https://checkout.razorpay.com\")"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"

# API URL used at build time. Update this to your live backend URL
# (Site settings → Environment variables → VITE_API_URL) once the
# backend is deployed, then trigger a redeploy.
[context.production.environment]
  VITE_API_URL = "https://urban-services-backend-1khb.onrender.com/api"

[context.deploy-preview.environment]
  VITE_API_URL = "https://urban-services-backend-1khb.onrender.com/api"

[context.branch-deploy.environment]
  VITE_API_URL = "https://urban-services-backend-1khb.onrender.com/api"
