[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  port = 3000

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  VITE_API_URL = "https://urban-services-backend-1khb.onrender.com/api"

[context.deploy-preview.environment]
  VITE_API_URL = "https://urban-services-backend-1khb.onrender.com/api"

[context.branch-deploy.environment]
  VITE_API_URL = "https://urban-services-backend-1khb.onrender.com/api"
